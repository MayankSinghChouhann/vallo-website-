<style>
/* BETA HERO / BG */
body {
  background: #f8fcfb;
  position: relative;
}
.beta-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 30%, rgba(26,188,156,0.06), transparent 50%),
              radial-gradient(circle at 80% 70%, rgba(75,46,131,0.04), transparent 50%);
  z-index: -2;
}
.bg-glow {
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(26,188,156,0.15), transparent 70%);
  top: -100px;
  right: -100px;
  filter: blur(60px);
  z-index: -1;
  animation: glowPulse 5s infinite alternate;
}

/* BETA CONTAINER */
.beta-section {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 120px 20px 60px;
}

.beta-card {
  width: 100%;
  max-width: 540px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 24px;
  padding: 50px 40px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.04), inset 0 0 0 1px rgba(255,255,255,0.4);
  transform: translateY(20px);
  opacity: 0;
  animation: slideUpFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes slideUpFade {
  to { transform: translateY(0); opacity: 1; }
}

.beta-header {
  text-align: center;
  margin-bottom: 35px;
}

.badge {
  display: inline-block;
  background: rgba(26,188,156,0.1);
  color: #1ABC9C;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 15px;
  border: 1px solid rgba(26,188,156,0.2);
}

.beta-header h1 {
  font-size: 36px;
  color: #0f172a;
  margin-bottom: 12px;
  line-height: 1.2;
}

.beta-header p {
  color: #475569;
  font-size: 15px;
  line-height: 1.6;
}

/* FORM ELEMENTS */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #334155;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  font-size: 15px;
  color: #0f172a;
  transition: all 0.3s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

.form-input:focus {
  outline: none;
  border-color: #1ABC9C;
  box-shadow: 0 0 0 3px rgba(26,188,156,0.15);
}

.form-input::placeholder {
  color: #94a3b8;
}

/* ROLE SELECTION */
.role-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 5px;
}

.role-card {
  position: relative;
  cursor: pointer;
}

.role-card input {
  position: absolute;
  opacity: 0;
  cursor: pointer;
}

.role-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 10px;
  background: #ffffff;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px;
  transition: all 0.2s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

.role-content svg {
  margin-bottom: 8px;
  stroke: #64748b;
  transition: 0.2s;
}

.role-content span {
  font-size: 13px;
  font-weight: 600;
  color: #475569;
  transition: 0.2s;
}

.role-card input:checked + .role-content {
  border-color: #1ABC9C;
  background: rgba(26,188,156,0.03);
  box-shadow: 0 4px 12px rgba(26,188,156,0.1);
}

.role-card input:checked + .role-content svg {
  stroke: #1ABC9C;
}

.role-card input:checked + .role-content span {
  color: #1ABC9C;
}

.role-card:hover .role-content {
  border-color: rgba(26,188,156,0.4);
}

/* SUBMIT BUTTON */
.submit-btn {
  width: 100%;
  padding: 16px;
  margin-top: 25px;
  background: linear-gradient(45deg, #1ABC9C, #16A085);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  box-shadow: 0 8px 20px rgba(26,188,156,0.25);
  display: flex;
  justify-content: center;
  align-items: center;
}

.submit-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 25px rgba(26,188,156,0.3);
}

.submit-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.spinner {
  width: 20px;
  height: 20px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-left: 10px;
  display: none;
}

.submit-btn.loading .spinner {
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* SUCCESS SCREEN */
.success-screen {
  display: none;
  text-align: center;
  padding: 20px 0;
  animation: fadeInScale 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

@keyframes fadeInScale {
  0% { opacity: 0; transform: scale(0.95); }
  100% { opacity: 1; transform: scale(1); }
}

.success-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(26,188,156,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 25px;
}

.checkmark {
  width: 40px;
  height: 40px;
  stroke: #1ABC9C;
  stroke-width: 3;
  stroke-dasharray: 48;
  stroke-dashoffset: 48;
  animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) 0.2s forwards;
}

@keyframes stroke {
  100% { stroke-dashoffset: 0; }
}

.success-screen h2 {
  font-size: 32px;
  color: #0f172a;
  margin-bottom: 12px;
  margin-top: 0;
}

.success-screen p.main-text {
  font-size: 18px;
  color: #1ABC9C;
  font-weight: 500;
  margin-bottom: 10px;
}

.success-screen p.sub-text {
  font-size: 15px;
  color: #64748b;
  margin-bottom: 35px;
  line-height: 1.6;
}

.back-home-btn {
  display: inline-flex;
  background: #f1f5f9;
  color: #0f172a;
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.2s;
}

.back-home-btn:hover {
  background: #e2e8f0;
  transform: translateY(-2px);
}

@media(max-width: 600px) {
  .beta-card {
    padding: 35px 25px;
  }
  .beta-header h1 {
    font-size: 28px;
  }
  .role-grid {
    grid-template-columns: 1fr;
  }
  .role-content {
    flex-direction: row;
    justify-content: flex-start;
    padding: 12px 16px;
  }
  .role-content svg {
    margin-bottom: 0;
    margin-right: 12px;
  }
}

<!-- Script to handle form submission via FormSubmit AJAX -->
<script>
// Check for success parameter in URL to show success screen
window.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('success') === 'true') {
    document.getElementById('form-container').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    
    // Remove the query param from URL without refreshing
    const newurl = window.location.protocol + "//" + window.location.host + window.location.pathname;
    window.history.pushState({path:newurl},'',newurl);
  }
});

document.getElementById('betaForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const form = this;
  const btn = document.getElementById('submitBtn');
  const role = this.querySelector('input[name="role"]:checked').value;
  
  // Set loading state
  btn.classList.add('loading');
  btn.disabled = true;
  btn.childNodes[0].nodeValue = "Submitting... ";

  const formData = new FormData(form);
  const data = {};
  formData.forEach((value, key) => data[key] = value);
  data['_subject'] = "New Beta Request: " + role;

  // Push GA4 event
  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({
    'event': 'beta_form_submit',
    'page_location': window.location.href,
    'user_type': role
  });

  fetch('https://formsubmit.co/ajax/vallo.mobility@gmail.com', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify(data)
  })
  .then(response => response.json())
  .then(data => {
    if (data.success === "true" || data.success === true) {
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
    } else {
      throw new Error('Form submission failed');
    }
  })
  .catch(error => {
    console.error('Error:', error);
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.childNodes[0].nodeValue = "Request Beta Access";
    alert('Oops! Something went wrong. Please try again.');
  });
});

// Close mobile menu when a nav link is clicked
document.querySelectorAll('.navbar nav a').forEach(link => {
  link.addEventListener('click', () => {
    const hamburger = document.querySelector('.hamburger');
    const nav = document.querySelector('.navbar nav');
    if (hamburger && nav) {
      hamburger.classList.remove('active');
      nav.classList.remove('active');
    }
  });
});
</script>
